name: tests

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LEAN_SPEC_COMMIT_HASH: 050fa4a18881d54d7dc07601fe59e34eb20b9630

jobs:
  spec-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache fixtures
        id: fixtures-cache
        uses: actions/cache@v5
        with:
          path: fixtures
          key: fixtures-${{env.LEAN_SPEC_COMMIT_HASH}}

      - name: Checkout leanSpec
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v6
        with:
          repository: leanEthereum/leanSpec
          ref: ${{env.LEAN_SPEC_COMMIT_HASH}}
          path: ./leanSpec

      - name: Install uv
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@v7

      - name: Generate specs
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        working-directory: ./leanSpec
        run: |
          uv sync
          uv run fill --clean --fork=devnet -o ../fixtures

      - name: Run spec tests
        run: cargo test --test spec-tests
