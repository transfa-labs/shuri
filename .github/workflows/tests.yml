name: tests

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  spec-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Checkout leanSpec
        uses: actions/checkout@v6
        with:
          repository: leanEthereum/leanSpec
          ref: 050fa4a18881d54d7dc07601fe59e34eb20b9630
          path: ./leanSpec

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Generate specs
        working-directory: ./leanSpec
        run: |
          uv sync
          uv run fill --clean --fork=devnet
          cp -R fixtures ../fixtures

      - name: Run spec tests
        run: cargo test --test spec-tests
